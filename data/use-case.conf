graph LR
    %% Определение акторов
    Customer((Клиент))

    subgraph Веб-приложение Меню для кафе и ресторанов доставки
        %% Прецеденты клиента
        UC1(Просмотр каталога меню)
        UC2(Фильтрация блюд по категориям)
        UC3(Управление корзиной заказа)
        UC4(Регистрация и Авторизация)
        UC5(Управление адресами доставки)
        UC6(Редактирование профиля)
        UC7(Удаление аккаунта)
        UC8(Личный кабинет пользователя)
        UC9(Отправка обращения в поддержку)
        UC10(Просмотр истории обращений)
    end

    %% Связи клиента
    Customer --> UC1
    Customer --> UC3
    Customer --> UC4
    Customer --> UC5

    %% Специфические связи (включения)
    UC1 -.->|include| UC2
    UC4 -.->|include| UC8
    UC8 -.->|include| UC6
    UC6 -.->|include| UC7
    UC8 -.->|include| UC5
    UC8 -.->|include| UC9
    UC9 -.->|include| UC10
